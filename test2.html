<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈 Coloring Fun! 🌈</title>
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(to bottom, #bfdbfe, #e0e7ff);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: bold;
            color: #1e40af;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .container {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            width: 100%;
            max-width: 400px;
        }
        .page-title {
            text-align: center;
            margin-bottom: 1rem;
            font-size: 1.5rem;
            font-weight: 600;
            color: #1f2937;
        }
        .coloring-area {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        svg {
            max-width: 100%;
            height: auto;
        }
        .color-section h3 {
            font-size: 1.1rem;
            font-weight: 500;
            color: #1f2937;
            margin-bottom: 0.75rem;
        }
        .color-palette {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .color-btn {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            border: 2px solid #d1d5db;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .color-btn:hover, .color-btn.selected {
            transform: scale(1.1);
            border-color: #3b82f6;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .selected-color {
            font-size: 0.875rem;
            color: #6b7280;
        }
        .selected-color span {
            font-weight: 500;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            gap: 0.5rem;
        }
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
            border: none;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .btn:active {
            transform: scale(0.95);
        }
        .prev-btn {
            background: #f3f4f6;
            color: #374151;
        }
        .reset-btn {
            background: #ef4444;
            color: white;
        }
        .next-btn {
            background: #3b82f6;
            color: white;
        }
        .instructions {
            text-align: center;
            color: #6b7280;
            font-size: 0.875rem;
        }
        .colorable-area {
            cursor: pointer;
            transition: fill 0.3s ease, opacity 0.2s;
        }
        .colorable-area:hover {
            opacity: 0.8;
        }
        .saving {
            opacity: 0.7;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <h1>🌈 Coloring Fun! 🌈</h1>
    
    <div class="container">
        <div class="page-title" id="pageTitle">Butterfly</div>
        
        <div class="coloring-area" id="coloringArea">
            <!-- SVG will be inserted here by JS -->
        </div>
        
        <div class="color-section">
            <h3>Choose a color:</h3>
            <div class="color-palette" id="colorPalette"></div>
            <div class="selected-color">
                Selected: <span id="current-color" style="color: #FF6B6B;">#FF6B6B</span>
            </div>
        </div>
        
        <div class="controls">
            <button type="button" class="btn prev-btn" id="prevBtn">← Previous</button>
            <button type="button" class="btn reset-btn" id="resetBtn">Reset</button>
            <button type="button" class="btn next-btn" id="nextBtn">Next →</button>
        </div>
    </div>
    
    <div class="instructions">
        <p>Click on a color, then click on an area to fill it! Colors save automatically in your browser.</p>
        <p>Have fun creating your masterpiece! 🎨</p>
    </div>

    <script>
        // Game data
        const coloringPages = [
            {
                title: "Butterfly",
                areas: [
                    { id: "wing1", path: "M100,150 Q150,100 200,150 Q150,200 100,150 Z" },
                    { id: "wing2", path: "M200,150 Q250,100 300,150 Q250,200 200,150 Z" },
                    { id: "body", path: "M175,150 L175,250 Q175,275 150,275 Q125,275 125,250 L125,150 Z" },
                    { id: "head", type: "circle", cx: 150, cy: 125, r: 25 }
                ]
            },
            {
                title: "House",
                areas: [
                    { id: "house", type: "rect", x: 75, y: 150, width: 150, height: 150 },
                    { id: "roof", type: "polygon", points: "50,150 150,50 250,150" },
                    { id: "door", type: "rect", x: 125, y: 225, width: 50, height: 75 },
                    { id: "window1", type: "rect", x: 90, y: 175, width: 30, height: 30 },
                    { id: "window2", type: "rect", x: 180, y: 175, width: 30, height: 30 }
                ]
            },
            {
                title: "Car",
                areas: [
                    { id: "carBody", type: "rect", x: 75, y: 200, width: 150, height: 75, rx: 10 },
                    { id: "carTop", type: "rect", x: 100, y: 150, width: 100, height: 50, rx: 5 },
                    { id: "wheel1", type: "circle", cx: 100, cy: 275, r: 25 },
                    { id: "wheel2", type: "circle", cx: 200, cy: 275, r: 25 },
                    { id: "window", type: "rect", x: 110, y: 160, width: 80, height: 30, rx: 3 }
                ]
            }
        ];

        const colorOptions = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFE66D', '#FF9F1C', '#9B5DE5', '#F15BB5', '#00BBF9', '#00F5D4', '#FEE440'];

        // State
        let selectedColor = '#FF6B6B';
        let currentPage = 0;
        let filledAreas = {};

        // Load from localStorage (like your applyTheme example)
        function loadGameState() {
            const saved = localStorage.getItem('coloringGameState');
            if (saved) {
                const state = JSON.parse(saved);
                selectedColor = state.selectedColor || '#FF6B6B';
                currentPage = state.currentPage || 0;
                filledAreas = state.filledAreas || {};
            }
        }

        // Save to localStorage (inspired by your JSON.stringify example)
        function saveGameState() {
            const state = {
                selectedColor: selectedColor,
                currentPage: currentPage,
                filledAreas: filledAreas
            };
            localStorage.setItem('coloringGameState', JSON.stringify(state));
        }

        // Generate SVG for current page
        function generateSVG() {
            const page = coloringPages[currentPage];
            let svgHtml = '<svg width="300" height="400" viewBox="0 0 300 400">';
            page.areas.forEach(area => {
                const fillColor = filledAreas[area.id] || 'white';
                let element = '';
                if (area.type === 'path') {
                    element = `<path id="${area.id}" d="${area.path}" fill="${fillColor}" stroke="#333" stroke-width="2" class="colorable-area" data-area="${area.id}" style="fill: ${fillColor}; cursor: pointer;" />`;
                } else if (area.type === 'rect') {
                    const attrs = Object.entries(area).filter(([k]) => k !== 'id' && k !== 'type').map(([k, v]) => `${k}="${v}"`).join(' ');
                    element = `<rect id="${area.id}" ${attrs} fill="${fillColor}" stroke="#333" stroke-width="2" class="colorable-area" data-area="${area.id}" style="fill: ${fillColor}; cursor: pointer;" />`;
                } else if (area.type === 'circle') {
                    const attrs = Object.entries(area).filter(([k]) => k !== 'id' && k !== 'type').map(([k, v]) => `${k}="${v}"`).join(' ');
                    element = `<circle id="${area.id}" ${attrs} fill="${fillColor}" stroke="#333" stroke-width="2" class="colorable-area" data-area="${area.id}" style="fill: ${fillColor}; cursor: pointer;" />`;
                } else if (area.type === 'polygon') {
                    element = `<polygon id="${area.id}" points="${area.points}" fill="${fillColor}" stroke="#333" stroke-width="2" class="colorable-area" data-area="${area.id}" style="fill: ${fillColor}; cursor: pointer;" />`;
                }
                svgHtml += element;
            });
            svgHtml += '</svg>';
            document.getElementById('coloringArea').innerHTML = svgHtml;
            document.getElementById('pageTitle').textContent = page.title;

            // Re-attach event listeners to new areas
            attachColoringListeners();
        }

        // Attach click listeners to colorable areas
        function attachColoringListeners() {
            document.querySelectorAll('.colorable-area').forEach(area => {
                area.addEventListener('click', (e) => {
                    const areaId = e.currentTarget.dataset.area;
                    filledAreas[areaId] = selectedColor;
                    e.currentTarget.style.fill = selectedColor;
                    document.body.classList.add('saving'); // Visual feedback
                    setTimeout(() => {
                        document.body.classList.remove('saving');
                        saveGameState(); // Save instantly
                    }, 300);
                });
            });
        }

        // Update selected color display
        function updateSelectedColorDisplay() {
            const colorSpan = document.getElementById('current-color');
            colorSpan.textContent = selectedColor;
            colorSpan.style.color = selectedColor;
        }

        // Initialize color palette
        function initColorPalette() {
            const palette = document.getElementById('colorPalette');
            colorOptions.forEach(color => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'color-btn' + (color === selectedColor ? ' selected' : '');
                btn.style.backgroundColor = color;
                btn.dataset.color = color;
                btn.addEventListener('click', () => {
                    selectedColor = color;
                    updateSelectedColorDisplay();
                    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    saveGameState(); // Save selected color
                });
                palette.appendChild(btn);
            });
        }

        // Navigation
        function changePage(direction) {
            currentPage = (currentPage + direction + coloringPages.length) % coloringPages.length;
            generateSVG();
            saveGameState();
            // Update button states (disable prev on first, next on last)
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').disabled = currentPage === coloringPages.length - 1;
        }

        // Reset current page
        function resetPage() {
            coloringPages[currentPage].areas.forEach(area => {
                filledAreas[area.id] = undefined; // Clear only current page areas
            });
            generateSVG();
            saveGameState();
        }

        // Event listeners for buttons
        document.addEventListener('DOMContentLoaded', () => {
            loadGameState();
            initColorPalette();
            updateSelectedColorDisplay();
            generateSVG();

            document.getElementById('prevBtn').addEventListener('click', () => changePage(-1));
            document.getElementById('nextBtn').addEventListener('click', () => changePage(1));
            document.getElementById('resetBtn').addEventListener('click', resetPage);

            // Initial button states
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').disabled = currentPage === coloringPages.length - 1;
        });
    </script>
</body>
</html>
